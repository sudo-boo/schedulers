name: Web Content Change Reminder

on:
  schedule:
    - cron: '00 9,12,15,18 * * *'
  workflow_dispatch:

# Give the workflow permission to write back to the repo
permissions:
  contents: write

jobs:
  send-change-reminders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt
        working-directory: web-content-change-reminder

      - name: Create .env file
        run: |
          touch .env
          echo "API_KEY=${{ secrets.API_KEY }}" > .env
          echo "SENDER_EMAIL=${{ secrets.SENDER_EMAIL }}" >> .env
          echo "SENDER_PASSWORD=${{ secrets.SENDER_PASSWORD }}" >> .env
        working-directory: web-content-change-reminder

      - name: Run Web Content Change Reminder Script
        run: python script.py
        working-directory: web-content-change-reminder

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add web-content-change-reminder/archives/
          git diff-index --quiet HEAD || git commit -m "Auto-archive website changes"
          git push